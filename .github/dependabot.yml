version: 2
updates:
  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["deps", "rust"]

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["deps", "frontend"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels: ["deps", "ci"]
